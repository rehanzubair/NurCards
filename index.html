<!doctype html>
<html lang="en" prefix="og: http://ogp.me/ns#">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <title>Nur Flashcards</title>
    
    <script>
      // Suppress benign Vite HMR connection errors in the console
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          (typeof event.reason === 'string' && event.reason.includes('WebSocket')) ||
          (event.reason.message && event.reason.message.includes('WebSocket'))
        )) {
          event.preventDefault();
        }
      });
    </script>
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="{{OG_TITLE}}" />
    <meta name="description" content="{{OG_DESCRIPTION}}" />
    
    <!-- Schema.org for Google -->
    <meta itemprop="name" content="{{OG_TITLE}}">
    <meta itemprop="description" content="{{OG_DESCRIPTION}}">
    <meta itemprop="image" content="{{OG_IMAGE}}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{OG_URL}}" />
    <meta property="og:title" content="{{OG_TITLE}}" />
    <meta property="og:description" content="{{OG_DESCRIPTION}}" />
    <meta property="og:image" content="{{OG_IMAGE}}" />
    <meta property="og:image:secure_url" content="{{OG_IMAGE}}" />
    <meta property="og:image:alt" content="{{OG_TITLE}}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Nur Flashcards" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="{{OG_URL}}" />
    <meta property="twitter:title" content="{{OG_TITLE}}" />
    <meta property="twitter:description" content="{{OG_DESCRIPTION}}" />
    <meta property="twitter:image" content="{{OG_IMAGE}}" />

    <!-- WhatsApp specific -->
    <meta property="og:image:alt" content="{{OG_TITLE}}" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
